<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8">
<style>
  :root { --bg: #fff; --text: #222; --border: #ccc; --link: #2563EB; --label: #000; --btn: #2563EB; --btnHover: #1d4ed8; --status: #16a34a; }
  @media (prefers-color-scheme: dark) { :root { --bg: #1e1e1e; --text: #e0e0e0; --border: #444; --link: #60a5fa; --label: #fff; --btn: #3b82f6; --btnHover: #2563eb; --status: #4ade80; } }
  body{width:320px;margin:0;padding:16px;font-family:system-ui,sans-serif;font-size:13px;color:var(--text);background:var(--bg)}
  h3{margin:0 0 10px;color:var(--link);font-size:15px}
  .inst{margin:0 0 14px;padding-left:18px;line-height:1.45;color:var(--text);opacity:0.8}
  .inst a{color:var(--link)}
  label{display:block;margin-top:10px;font-weight:600;color:var(--label)}
  input,textarea{width:100%;padding:8px;margin-top:4px;box-sizing:border-box;border:1px solid var(--border);border-radius:4px;font-family:inherit;background:var(--bg);color:var(--text)}
  textarea{height:72px;resize:vertical}
  button{margin-top:10px;padding:6px 14px;background:var(--btn);color:#fff;border:none;border-radius:4px;cursor:pointer}
  button:hover{background:var(--btnHover)}
  #status{margin-top:6px;font-size:12px;color:var(--status);opacity:0;transition:opacity .3s}
</style>
</head>
<body>
  <h3>Qwen Explain</h3>
  <ol class="inst">
    <li>Register on <a href="https://chat.qwen.ai/" target="_blank">chat.qwen.ai</a>.</li>
    <li>Select text or right-click a link → <b>Explain in Qwen</b>.</li>
    <li>Qwen tab opens, prompt auto-fills & sends.</li>
  </ol>
  <label>Custom Prompt:</label>
  <textarea id="prompt" placeholder="Briefly explain what this is about:"></textarea>
  <label>Max Wait (seconds):</label>
  <input type="number" id="delay" min="1" max="60" value="5.5" step="0.5">
  <button id="save">Save</button>
  <div id="status">Saved!</div>
  <script src="popup.js"></script>
</body>
</html>
